name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v2
        with:
          node-version: 16.x
      - uses: oven-sh/setup-bun@v2
      - uses: actions/checkout@v2
      - uses: pnpm/action-setup@v2
        with:
          version: 8.11.0  
      - run: pnpm i
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1



      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build contracts --sizes
          forge build test
        id: build

      - name: Run Forge tests
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
        run: |
          forge test --mc AuthUpgradeable
          forge test --fork-url $ETHEREUM_RPC_URL --mc NestVault
          forge test --fork-url $ETHEREUM_RPC_URL --mc NestAccountant
          forge test --match-contract BoringVaultSY  -vv
          forge test --match-contract NestShareOFT
        id: test
